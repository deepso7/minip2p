name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: stable
          components: clippy,rustfmt
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - run: cargo fmt --all -- --check
      - run: cargo fmt --manifest-path fuzz/Cargo.toml -- --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo clippy --manifest-path fuzz/Cargo.toml --all-targets -- -D warnings
      - run: cargo check --workspace --all-targets
      - run: cargo check --manifest-path fuzz/Cargo.toml --all-targets
      - run: cargo check --no-default-features -p minip2p-core -p minip2p-identity -p minip2p-transport -p minip2p-tls -p minip2p-identify -p minip2p-multistream-select -p minip2p-ping -p minip2p-relay -p minip2p-autonat -p minip2p-dcutr -p minip2p-swarm
      - run: cargo test --workspace
      - run: cargo doc --workspace --no-deps
      - run: cargo bench -p minip2p-core --bench multiaddr --no-run

  fuzz-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable action revision
        with:
          toolchain: nightly
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: fuzz
      - run: cargo install cargo-fuzz --locked
      - run: cargo +nightly fuzz run wire_inputs -- -max_total_time=30
