name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: clippy,rustfmt
          # Real no_std target: a host check can't catch dependencies that
          # unconditionally link std.
          targets: thumbv7em-none-eabi
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check
      - run: cargo fmt --manifest-path fuzz/Cargo.toml -- --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo clippy -p minip2p --features nat --all-targets -- -D warnings
      - run: cargo clippy -p minip2p --features nat,pubsub --all-targets -- -D warnings
      - run: cargo check -p minip2p
      - run: cargo check -p minip2p --features pubsub
      - run: cargo clippy --manifest-path fuzz/Cargo.toml --all-targets -- -D warnings
      - run: cargo check --no-default-features --target thumbv7em-none-eabi -p minip2p-core -p minip2p-identity -p minip2p-transport -p minip2p-tls -p minip2p-identify -p minip2p-multistream-select -p minip2p-ping -p minip2p-pubsub -p minip2p-relay -p minip2p-autonat -p minip2p-dcutr -p minip2p-swarm -p minip2p-nat
      - run: cargo test --workspace
      - run: cargo test -p minip2p --features nat
      - run: cargo test -p minip2p --features nat,pubsub
      - run: cargo doc --workspace --no-deps
      - run: cargo bench -p minip2p-core --bench multiaddr --no-run

  msrv:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable # 1.88 (workspace rust-version) via the toolchain input
        with:
          toolchain: "1.88"
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --workspace --all-targets

  fuzz-smoke:
    runs-on: ubuntu-latest
    env:
      # Pinned so a broken upstream nightly can't fail every PR and the
      # rust-cache key stays stable. Bump deliberately.
      NIGHTLY_TOOLCHAIN: nightly-2026-07-01
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable # installs the nightly toolchain below via the toolchain input
        with:
          toolchain: ${{ env.NIGHTLY_TOOLCHAIN }}
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: fuzz
      # Swatinem/rust-cache does not cache ~/.cargo/bin, so cargo-fuzz is
      # rebuilt on every run (~1 min). Pinned --version + --locked keeps the
      # tool and its dependency tree fully reproducible (same intent as the
      # pinned nightly above); a bare --locked would still float to whatever
      # cargo-fuzz release is newest. Bump deliberately.
      - run: cargo install cargo-fuzz --version 0.13.2 --locked
      - run: cargo +$NIGHTLY_TOOLCHAIN fuzz run wire_inputs -- -max_total_time=30
      - uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: fuzz-artifacts
          path: fuzz/artifacts
          if-no-files-found: ignore
