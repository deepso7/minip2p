[package]
name = "minip2p-identity"
version = "0.1.0"
edition = "2024"
readme = "README.md"

[features]
default = ["std"]
std = ["thiserror/std", "multihash/std", "ed25519-dalek/std", "rand_core/std"]

[dependencies]
ed25519-dalek = { version = "2", default-features = false, features = ["rand_core"] }
multihash = { version = "0.19", default-features = false, features = ["alloc"] }
rand_core = { version = "0.6", default-features = false, features = ["getrandom"] }
sha2 = { version = "0.10", default-features = false }
thiserror = { version = "2", default-features = false }
