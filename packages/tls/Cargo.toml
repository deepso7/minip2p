[package]
name = "minip2p-tls"
version = "0.1.0"
edition = "2024"
readme = "README.md"

[features]
default = ["std"]
std = [
    "dep:getrandom",
    "minip2p-identity/std",
    "thiserror/std",
    "der/std",
    "der/pem",
    "x509-cert/std",
    "x509-cert/pem",
    "spki/std",
    "p256/std",
    "ecdsa/std",
]

# NOTE: pre-release version pins are intentional.
#
# `x509-cert`, `p256`, `ecdsa`, `signature`, and `sha2` are pinned to
# RustCrypto release candidates (0.3.0-rc.4, 0.14.0-rc.9, 0.17.0-rc.17,
# 3.0.0-rc.10, and 0.11 respectively). These are the first versions that
# expose the certificate-builder and signature-trait APIs we need while
# remaining `no_std + alloc` compatible; the current stable releases either
# drop `no_std` support or lack the builder API surface.
#
# Upgrade coordination rule: bump all five pins together, in lockstep with
# a matching `rand_core` / `sha2` / `signature` release train, otherwise
# `Cargo.lock` ends up with duplicate versions of these crates alongside
# those pulled in by `minip2p-identity` (ed25519-dalek 2.x → signature 2.x,
# sha2 0.10).
[dependencies]
minip2p-identity = { path = "../identity", default-features = false, features = ["ed25519"] }
der = { version = "0.8", default-features = false, features = ["alloc", "oid"] }
x509-cert = { version = "0.3.0-rc.4", default-features = false, features = ["builder"] }
const-oid = { version = "0.10", default-features = false }
spki = { version = "0.8", default-features = false, features = ["alloc"] }
thiserror = { version = "2", default-features = false }
p256 = { version = "0.14.0-rc.9", default-features = false, features = ["ecdsa", "pkcs8", "alloc"] }
ecdsa = { version = "0.17.0-rc.17", default-features = false, features = ["der", "alloc"] }
signature = { version = "3.0.0-rc.10", default-features = false }
sha2 = { version = "0.11", default-features = false, features = ["oid"] }
rand_core = { version = "0.10", default-features = false }
getrandom = { version = "0.4", default-features = false, optional = true, features = ["sys_rng"] }
